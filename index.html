<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tristiana Dewi | Digital Financial Planner</title>
    <!-- Google Fonts: Space Grotesk & Plus Jakarta Sans -->
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <!-- Font Awesome untuk Icon -->
    <link rel="stylesheet" href="https://cloudflare.com">
    
    <style>
        :root {
            --p-pink: #ffd6e8;
            --p-purple: #e8dbff;
            --p-mint: #d6fff1;
            --d-dark: #3a2e3b;
            --glow-pink: rgba(255, 182, 193, 0.4);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #fff3f8 0%, #f4ebff 50%, #ebfffa 100%);
            color: var(--d-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
            box-sizing: border-box;
            margin: 0;
        }

        /* Lingkaran Gradasi Digital Glowing di Latar Belakang */
        .bg-glow-1, .bg-glow-2 {
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.5;
            z-index: 0;
            pointer-events: none;
        }
        .bg-glow-1 { top: -50px; left: -50px; background: #ffb7dd; }
        .bg-glow-2 { bottom: -50px; right: -50px; background: #bdfad9; }

        /* Efek Partikel Pixel Bunga Digital */
        .digital-petal {
            position: fixed;
            top: -20px;
            pointer-events: none;
            z-index: 0;
            font-size: 16px;
            animation: digitalFall linear infinite;
            filter: drop-shadow(0 0 5px rgba(255,255,255,0.8));
        }

        @keyframes digitalFall {
            0% { transform: translateY(0) rotate(0deg) scale(0.8); opacity: 0; }
            10% { opacity: 0.7; }
            90% { opacity: 0.7; }
            100% { transform: translateY(105vh) rotate(180deg) scale(1.1); opacity: 0; }
        }

        /* Glassmorphism Card */
        .profile-card {
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 32px;
            padding: 35px 25px;
            width: 100%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(220, 180, 210, 0.15), 
                        inset 0 0 20px rgba(255, 255, 255, 0.3);
            position: relative;
            z-index: 1;
        }

        /* Avatar / Icon Badge */
        .tech-badge {
            width: 65px;
            height: 65px;
            margin: 0 auto 12px auto;
            background: linear-gradient(135deg, #fff 0%, #fff 100%);
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            box-shadow: 0 8px 20px var(--glow-pink);
            position: relative;
            animation: pulseGlow 3s ease-in-out infinite;
        }

        @keyframes pulseGlow {
            0%, 100% { box-shadow: 0 8px 20px rgba(255, 182, 193, 0.4); transform: scale(1); }
            50% { box-shadow: 0 8px 30px rgba(186, 235, 211, 0.7); transform: scale(1.03); }
        }

        h1 {
            font-family: 'Space Grotesk', sans-serif;
            color: #4a3b4c;
            font-size: 2.1rem;
            margin: 0 0 4px 0;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #9c82a6;
            margin-bottom: 20px;
            font-weight: 700;
            background: linear-gradient(90deg, #b589d6, #e387b3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .intro-text {
            font-size: 0.9rem;
            line-height: 1.5;
            color: #615263;
            margin-bottom: 25px;
        }

        /* Section Bergaya Aplikasi Digital */
        .section {
            margin-bottom: 18px;
            background: rgba(255, 255, 255, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.5);
            padding: 15px;
            border-radius: 18px;
            text-align: left;
        }

        h3 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #7b5b8c;
            margin-top: 0;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .service-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .service-tag {
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(255, 214, 232, 0.5);
            padding: 8px 10px;
            border-radius: 12px;
            font-size: 0.78rem;
            font-weight: 600;
            color: #554457;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s ease;
        }

        .service-tag:hover {
            background: #fff;
            border-color: #ffd6e8;
            transform: scale(1.02);
        }

        .social-links {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 20px;
        }

        /* Desain Tombol */
        .social-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            text-decoration: none;
            background: rgba(255, 255, 255, 0.7);
            color: #6a5370;
            padding: 12px 18px;
            border-radius: 14px;
            font-weight: 600;
            font-size: 0.88rem;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        .social-btn .btn-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .social-btn i.fa-arrow-up-right-from-square, .social-btn i.fa-download {
            font-size: 0.72rem;
            opacity: 0.4;
            transition: transform 0.3s ease;
        }

        /* Tombol CTA Utama - Efek Gradasi Digital Menyala */
        .social-btn.cta-main {
            background: linear-gradient(135deg, #ffd6e8 0%, #e8dbff 100%);
            color: #60406e;
            border: none;
            box-shadow: 0 4px 15px rgba(232, 219, 255, 0.6);
        }

        /* Tombol Download Freebies - Aksen Hijau Mint Pastel */
        .social-btn.cta-freebie {
            background: linear-gradient(135deg, #e6fffa 0%, #d6fff1 100%);
            color: #2d5749;
            border: 1px solid rgba(189, 250, 217, 0.6);
        }

        .social-btn:hover {
            background: #fff;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(156, 130, 166, 0.1);
        }

        .social-btn.cta-main:hover {
            background: linear-gradient(135deg, #fbcfe8 0%, #ddd0f7 100%);
            box-shadow: 0 8px 25px rgba(255, 182, 193, 0.5);
        }

        .social-btn.cta-freebie:hover {
            background: linear-gradient(135deg, #ccfff5 0%, #b3ffd6 100%);
            box-shadow: 0 8px 20px rgba(189, 250, 217, 0.6);
        }

        .social-btn:hover i.fa-arrow-up-right-from-square {
            transform: translate(2px, -2px);
            opacity: 1;
        }

        .social-btn:hover i.fa-download {
            transform: translateY(2px);
            opacity: 1;
        }

        footer {
            margin-top: 25px;
            font-size: 0.72rem;
            letter-spacing: 1px;
            color: #a392a8;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <!-- Lingkaran Gradasi Glow di Background -->
    <div class="bg-glow-1"></div>
    <div class="bg-glow-2"></div>

    <!-- Wadah Efek Kelopak Bunga Digital -->
    <div id="digital-petal-container"></div>

    <!-- Main Profile Card -->
    <div class="profile-card">
        <div class="tech-badge">🌸</div>
        <h1>Tristiana Dewi</h1>
        <div class="subtitle">Digital Financial Planner</div>
        
        <p class="intro-text">
            Mari ubah kebiasaan finansialmu menjadi lebih sehat, teratur, dan bebas stres tanpa harus mengorbankan kebahagiaan hari ini.
        </p>

                <!-- Tombol Aksi & Media Sosial -->
        <div class="social-links">
            <a href="https://wa.me." target="_blank" class="social-btn cta-main">
                <div class="btn-left">
                    <i class="fa-solid fa-heart-pulse"></i>
                    <span>Mulai Obrolan Finansial (WA)</span>
                </div>
                <i class="fa-solid fa-arrow-up-right-from-square"></i>
            </a>

            <a href="#" target="_blank" class="social-btn cta-freebie">
                <div class="btn-left">
                    <i class="fa-solid fa-file-excel"></i>
                    <span>Free Excel Budgeting Template</span>
                </div>
                <i class="fa-solid fa-download"></i>
            </a>

            <a href="https://instagram.com" target="_blank" class="social-btn">
                <div class="btn-left">
                    <i class="fa-brands fa-instagram text-pink-400"></i>
                    <span>Instagram</span>
                </div>
                <i class="fa-arrow-up-right-from-square fa-solid"></i>
            </a>
            <a href="https://threads.net" target="_blank" class="social-btn">
                <div class="btn-left">
                    <i class="fa-brands fa-threads text-purple-400"></i>
                    <span>Threads</span>
                </div>
                <i class="fa-arrow-up-right-from-square fa-solid"></i>
            </a>
            <a href="https://tiktok.com" target="_blank" class="social-btn">
                <div class="btn-left">
                    <i class="fa-brands fa-tiktok text-black"></i>
                    <span>TikTok</span>
                </div>
                <i class="fa-arrow-up-right-from-square fa-solid"></i>
            </a>
            <a href="https://youtube.com" target="_blank" class="social-btn">
                <div class="btn-left">
                    <i class="fa-brands fa-youtube text-red-400"></i>
                    <span>YouTube</span>
                </div>
                <i class="fa-arrow-up-right-from-square fa-solid"></i>
            </a>
        </div>

        <footer>
            DIGITAL HUB &copy; 2026 TRISTIANA DEWI
        </footer>
    </div>

    <!-- Script Kelopak Bunga Gugur -->
    <script>
        const container = document.getElementById('digital-petal-container');
        const elements = ['🌸', '✨', '🤍', '✦'];

        function createDigitalPetal() {
            const el = document.createElement('div');
            el.classList.add('digital-petal');
            el.innerText = elements[Math.floor(Math.random() * elements.length)];
            el.style.left = Math.random() * 100 + 'vw';
            
            const duration = Math.random() * 3 + 4; 
            el.style.animationDuration = duration + 's';
            el.style.fontSize = Math.random() * 8 + 12 + 'px';
            
            container.appendChild(el);

            setTimeout(() => {
                el.remove();
            }, duration * 1000);
        }

        setInterval(createDigitalPetal, 500);
    </script>
</body>
</html>
